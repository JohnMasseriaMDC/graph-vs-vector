/* ═══════════════════ COMPONENTS ═══════════════════ */

const mono = "'JetBrains Mono', 'Fira Code', 'Courier New', monospace";
const sans = "'DM Sans', sans-serif";

function CodeBlock({ code, lang }) {
  return (
    <div style={{ background: "#1a1a2e", borderRadius: 8, padding: "14px 18px", marginTop: 10, fontFamily: mono, fontSize: 12.5, lineHeight: 1.6, color: "#e0e0e0", overflowX: "auto", position: "relative" }}>
      <div style={{ position: "absolute", top: 8, right: 12, fontSize: 10, color: "#6a6a8a", fontFamily: sans, letterSpacing: 0.5, textTransform: "uppercase" }}>{lang}</div>
      <pre>{code}</pre>
    </div>
  );
}

/* ── Graph Schema Diagram ── */
function GraphSchemaViz({ schema, accent }) {
  return (
    <div style={{ marginTop: 16 }}>
      <h4 style={{ margin: "0 0 12px", fontSize: 13, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Schema — Node Labels &amp; Relationships</h4>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
        {schema.nodes.map((n, i) => (
          <div key={i} style={{ background: `${n.color}12`, border: `1px solid ${n.color}30`, borderRadius: 8, padding: "10px 14px", minWidth: 150, flex: "1 1 150px" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: n.color, fontFamily: sans, marginBottom: 6 }}>:{n.label}</div>
            {n.props.map((p, j) => (
              <div key={j} style={{ fontSize: 11.5, color: "#a0a0b0", fontFamily: mono, lineHeight: 1.7 }}>{p}</div>
            ))}
          </div>
        ))}
      </div>
      <div style={{ background: "#13131f", borderRadius: 8, padding: "12px 16px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#6a6a8a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontFamily: sans }}>Relationships (Edges)</div>
        {schema.edges.map((e, i) => (
          <div key={i} style={{ fontSize: 12.5, fontFamily: mono, color: "#a0a0b0", lineHeight: 1.8 }}>
            <span style={{ color: "#60a5fa" }}>(:{e.from})</span>
            <span style={{ color: "#6a6a8a" }}> —</span>
            <span style={{ color: "#fbbf24" }}>[:{e.label}]</span>
            <span style={{ color: "#6a6a8a" }}>→ </span>
            <span style={{ color: "#60a5fa" }}>(:{e.to})</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Graph Sample Data ── */
function GraphSampleData({ data, accent }) {
  const colors = { Customer: "#2dd4bf", Passenger: "#2dd4bf", Application: "#2dd4bf", Account: "#60a5fa", Sailing: "#60a5fa", Service: "#60a5fa", Device: "#f472b6", Excursion: "#f472b6", LoadBalancer: "#f472b6", Address: "#fbbf24", Port: "#fbbf24", Database: "#fbbf24" };
  return (
    <div style={{ marginTop: 16 }}>
      <h4 style={{ margin: "0 0 8px", fontSize: 13, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Sample Data</h4>
      <p style={{ fontSize: 12.5, color: "#8080a0", lineHeight: 1.6, fontFamily: sans, marginBottom: 12 }}>{data.description}</p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
        {data.nodes.map((n, i) => {
          const c = colors[n.type] || "#60a5fa";
          return (
            <div key={i} style={{ background: `${c}08`, border: `1px solid ${c}20`, borderRadius: 6, padding: "6px 10px", fontSize: 11, fontFamily: mono, color: "#a0a0b0", lineHeight: 1.6 }}>
              <span style={{ color: c, fontWeight: 700 }}>{n.type}</span>{" "}
              {Object.entries(n.data).map(([k, v], j) => (
                <span key={j}>{k}:<span style={{ color: "#e0e0e0" }}>{v}</span>{j < Object.entries(n.data).length - 1 ? ", " : ""}</span>
              ))}
            </div>
          );
        })}
      </div>
      <div style={{ background: "#13131f", borderRadius: 8, padding: "12px 16px" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#6a6a8a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, fontFamily: sans }}>Edges (Relationships)</div>
        {data.edges.map((e, i) => (
          <div key={i} style={{ fontSize: 12, fontFamily: mono, color: "#a0a0b0", lineHeight: 1.8 }}>{e}</div>
        ))}
      </div>
    </div>
  );
}

/* ── Vector Schema Diagram ── */
function VectorSchemaViz({ schema, accent }) {
  return (
    <div style={{ marginTop: 16 }}>
      <h4 style={{ margin: "0 0 12px", fontSize: 13, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Collection Schema — <span style={{ fontFamily: mono, fontWeight: 400 }}>{schema.collectionName}</span></h4>
      <div style={{ background: "#13131f", borderRadius: 8, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr", gap: 0, fontSize: 11, fontWeight: 700, color: "#6a6a8a", textTransform: "uppercase", letterSpacing: 0.8, padding: "8px 16px", borderBottom: "1px solid #1a1a2e", fontFamily: sans }}>
          <div>Field</div><div>Type</div><div>Description</div>
        </div>
        {schema.fields.map((f, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr", gap: 0, padding: "6px 16px", borderBottom: i < schema.fields.length - 1 ? "1px solid #1a1a2e" : "none", background: f.isVector ? `${accent}08` : "transparent" }}>
            <div style={{ fontSize: 12, fontFamily: mono, color: f.isVector ? accent : "#e0e0e0", fontWeight: f.isVector ? 700 : 400 }}>{f.name}</div>
            <div style={{ fontSize: 11, fontFamily: mono, color: f.isVector ? accent : "#8080a0" }}>{f.type}</div>
            <div style={{ fontSize: 11.5, fontFamily: sans, color: "#8080a0" }}>{f.desc || ""}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Vector Sample Data ── */
function VectorSampleData({ data, accent }) {
  return (
    <div style={{ marginTop: 16 }}>
      <h4 style={{ margin: "0 0 8px", fontSize: 13, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Sample Results</h4>
      <p style={{ fontSize: 12.5, color: "#8080a0", lineHeight: 1.6, fontFamily: sans, marginBottom: 12 }}>{data.description}</p>
      {data.records.map((rec, i) => {
        const entries = Object.entries(rec);
        return (
          <div key={i} style={{ background: "#13131f", borderRadius: 8, padding: "12px 16px", marginBottom: 8, borderLeft: `3px solid ${accent}${i === 0 ? "" : "60"}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <span style={{ fontSize: 12, fontFamily: mono, color: accent, fontWeight: 700 }}>#{i + 1}</span>
              {rec.similarity && <span style={{ fontSize: 11, fontFamily: mono, color: i === 0 ? "#4ade80" : "#8080a0", background: i === 0 ? "#4ade8015" : "transparent", padding: "2px 8px", borderRadius: 4 }}>cosine: {rec.similarity}</span>}
            </div>
            {entries.filter(([k]) => k !== "similarity" && k !== "embedding" && k !== "image_embedding").map(([k, v], j) => (
              <div key={j} style={{ fontSize: 12, fontFamily: mono, color: "#a0a0b0", lineHeight: 1.7 }}>
                <span style={{ color: "#6a6a8a" }}>{k}: </span>
                <span style={{ color: k.includes("text") || k === "name" ? "#e0e0e0" : "#a0a0b0" }}>{v}</span>
              </div>
            ))}
            {(rec.embedding || rec.image_embedding) && (
              <div style={{ fontSize: 11, fontFamily: mono, color: `${accent}80`, marginTop: 4 }}>
                embedding: {rec.embedding || rec.image_embedding}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


/* ── Main Example Card ── */
function ExampleCard({ example, type }) {
  const [expanded, setExpanded] = useState(false);
  const [showSchema, setShowSchema] = useState(true);
  const accent = type === "graph" ? "#2dd4bf" : "#a78bfa";
  const bgTint = type === "graph" ? "rgba(45,212,191,0.04)" : "rgba(167,139,250,0.04)";

  return (
    <div style={{ background: bgTint, border: `1px solid ${type === "graph" ? "rgba(45,212,191,0.15)" : "rgba(167,139,250,0.15)"}`, borderRadius: 12, padding: "22px 24px", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
        <div style={{ fontSize: 28, lineHeight: 1 }}>{example.icon}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: "#e8e8e8", fontFamily: sans }}>{example.title}</h3>
            {example.industry && (
              <span style={{ fontSize: 11, color: accent, background: `${accent}15`, padding: "3px 10px", borderRadius: 20, fontWeight: 600, letterSpacing: 0.3, fontFamily: sans }}>{example.industry}</span>
            )}
          </div>
          <p style={{ margin: "10px 0 0", fontSize: 14, lineHeight: 1.65, color: "#a0a0b0", fontFamily: sans }}>{example.scenario}</p>
          <button onClick={() => setExpanded(!expanded)} style={{ marginTop: 12, background: "none", border: `1px solid ${accent}40`, color: accent, padding: "6px 16px", borderRadius: 6, fontSize: 13, fontWeight: 600, fontFamily: sans }}>
            {expanded ? "Collapse ▲" : "Show Details ▼"}
          </button>
        </div>
      </div>
      {expanded && (
        <div style={{ marginTop: 18, paddingTop: 18, borderTop: `1px solid ${accent}15` }}>
          <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "rgba(255,255,255,0.03)", padding: 4, borderRadius: 8, width: "fit-content" }}>
            {["Schema & Data", "How It Works"].map((tab, idx) => {
              const active = idx === 0 ? showSchema : !showSchema;
              return (
                <button key={idx} onClick={() => setShowSchema(idx === 0)} style={{ background: active ? `${accent}15` : "transparent", border: active ? `1px solid ${accent}25` : "1px solid transparent", color: active ? accent : "#6a6a8a", padding: "5px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, fontFamily: sans }}>
                  {tab}
                </button>
              );
            })}
          </div>

          {showSchema ? (
            <>
              {type === "graph" && example.schema && <GraphSchemaViz schema={example.schema} accent={accent} />}
              {type === "vector" && example.schema && <VectorSchemaViz schema={example.schema} accent={accent} />}
              {type === "graph" && example.sampleData && <GraphSampleData data={example.sampleData} accent={accent} />}
              {type === "vector" && example.sampleData && <VectorSampleData data={example.sampleData} accent={accent} />}
            </>
          ) : (
            <>
              <div style={{ marginBottom: 16 }}>
                <h4 style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 700, color: accent, textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>How It Works</h4>
                {example.howItWorks.map((step, i) => (
                  <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 13.5, lineHeight: 1.6, color: "#a0a0b0", fontFamily: sans }}>
                    <span style={{ color: accent, fontWeight: 700, minWidth: 18, fontFamily: mono, fontSize: 12, marginTop: 2 }}>{String(i + 1).padStart(2, "0")}</span>
                    <span>{step}</span>
                  </div>
                ))}
              </div>
              <CodeBlock code={example.query} lang={example.queryLang} />
              <div style={{ marginTop: 16, padding: "12px 16px", background: `${accent}08`, borderLeft: `3px solid ${accent}`, borderRadius: "0 6px 6px 0", fontSize: 13, lineHeight: 1.6, color: "#a0a0b0", fontFamily: sans }}>
                <strong style={{ color: "#e8e8e8" }}>Why not {type === "graph" ? "SQL" : "a graph database"}?</strong>{" "}
                {type === "graph" ? example.whyNotSQL : example.whyNotGraph}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}


/* ── Combined Card (Both Together) ── */
function CombinedCard({ example }) {
  const [expanded, setExpanded] = useState(false);
  const [showSchema, setShowSchema] = useState(true);

  return (
    <div style={{ background: "linear-gradient(135deg, rgba(45,212,191,0.04), rgba(167,139,250,0.04))", border: "1px solid rgba(120,120,180,0.15)", borderRadius: 12, padding: "22px 24px", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
        <div style={{ fontSize: 28, lineHeight: 1 }}>{example.icon}</div>
        <div style={{ flex: 1 }}>
          <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: "#e8e8e8", fontFamily: sans }}>{example.title}</h3>
          <p style={{ margin: "10px 0 0", fontSize: 14, lineHeight: 1.65, color: "#a0a0b0", fontFamily: sans }}>{example.scenario}</p>
          <button onClick={() => setExpanded(!expanded)} style={{ marginTop: 12, background: "none", border: "1px solid rgba(120,120,180,0.3)", color: "#9090c0", padding: "6px 16px", borderRadius: 6, fontSize: 13, fontWeight: 600, fontFamily: sans }}>
            {expanded ? "Collapse ▲" : "Show Details ▼"}
          </button>
        </div>
      </div>
      {expanded && (
        <div style={{ marginTop: 18, paddingTop: 18, borderTop: "1px solid rgba(120,120,180,0.1)" }}>
          <div style={{ display: "flex", gap: 4, marginBottom: 16, background: "rgba(255,255,255,0.03)", padding: 4, borderRadius: 8, width: "fit-content" }}>
            {["Schemas", "How They Work Together"].map((tab, idx) => {
              const active = idx === 0 ? showSchema : !showSchema;
              return (
                <button key={idx} onClick={() => setShowSchema(idx === 0)} style={{ background: active ? "rgba(120,120,180,0.15)" : "transparent", border: active ? "1px solid rgba(120,120,180,0.25)" : "1px solid transparent", color: active ? "#b0b0d0" : "#6a6a8a", padding: "5px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, fontFamily: sans }}>
                  {tab}
                </button>
              );
            })}
          </div>

          {showSchema ? (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#2dd4bf", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontFamily: sans }}>Graph Schema</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {example.graphSchema.nodes.map((n, i) => (
                    <div key={i} style={{ background: `${n.color}10`, border: `1px solid ${n.color}25`, borderRadius: 6, padding: "8px 12px" }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: n.color, fontFamily: sans }}>:{n.label}</div>
                      <div style={{ fontSize: 10.5, fontFamily: mono, color: "#8080a0", marginTop: 4 }}>{n.props.join(", ")}</div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 10, background: "#13131f", borderRadius: 6, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#4a4a6a", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 4 }}>Edges</div>
                  {example.graphSchema.edges.map((e, i) => (
                    <div key={i} style={{ fontSize: 11, fontFamily: mono, color: "#8080a0", lineHeight: 1.7 }}>
                      (:{e.from}) —[:{e.label}]→ (:{e.to})
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#a78bfa", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontFamily: sans }}>Vector Collection — <span style={{ fontWeight: 400, fontFamily: mono }}>{example.vectorSchema.collectionName}</span></div>
                <div style={{ background: "#13131f", borderRadius: 6, overflow: "hidden" }}>
                  {example.vectorSchema.fields.map((f, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 12px", borderBottom: i < example.vectorSchema.fields.length - 1 ? "1px solid #1a1a2e" : "none", background: f.isVector ? "rgba(167,139,250,0.06)" : "transparent" }}>
                      <span style={{ fontSize: 11.5, fontFamily: mono, color: f.isVector ? "#a78bfa" : "#c0c0d0", fontWeight: f.isVector ? 700 : 400 }}>{f.name}</span>
                      <span style={{ fontSize: 10.5, fontFamily: mono, color: f.isVector ? "#a78bfa" : "#6a6a8a" }}>{f.type}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
                <div style={{ padding: "14px 16px", background: "rgba(45,212,191,0.06)", borderRadius: 8, borderLeft: "3px solid #2dd4bf" }}>
                  <h4 style={{ margin: "0 0 8px", fontSize: 12, fontWeight: 700, color: "#2dd4bf", textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Graph Role</h4>
                  <p style={{ margin: 0, fontSize: 13, lineHeight: 1.6, color: "#a0a0b0", fontFamily: sans }}>{example.graphRole}</p>
                </div>
                <div style={{ padding: "14px 16px", background: "rgba(167,139,250,0.06)", borderRadius: 8, borderLeft: "3px solid #a78bfa" }}>
                  <h4 style={{ margin: "0 0 8px", fontSize: 12, fontWeight: 700, color: "#a78bfa", textTransform: "uppercase", letterSpacing: 1, fontFamily: sans }}>Vector Role</h4>
                  <p style={{ margin: 0, fontSize: 13, lineHeight: 1.6, color: "#a0a0b0", fontFamily: sans }}>{example.vectorRole}</p>
                </div>
              </div>
              <div style={{ padding: "12px 16px", background: "rgba(120,120,180,0.06)", borderRadius: 8, fontSize: 13.5, lineHeight: 1.65, color: "#a0a0b0", fontFamily: sans }}>
                <strong style={{ color: "#e8e8e8" }}>Key Insight: </strong>{example.insight}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}


/* ═══════════════════ MAIN APP ═══════════════════ */
function App() {
  const [activeTab, setActiveTab] = useState("graph");
  const tabs = [
    { id: "graph", label: "Graph DB", color: "#2dd4bf" },
    { id: "vector", label: "Vector DB", color: "#a78bfa" },
    { id: "both", label: "Both Together", color: "#9090c0" },
  ];

  return (
    <div style={{ minHeight: "100vh", padding: "36px 28px", maxWidth: 820, margin: "0 auto" }}>
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
          <div style={{ width: 36, height: 4, background: "linear-gradient(90deg, #2dd4bf, #a78bfa)", borderRadius: 2 }} />
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#6a6a8a" }}>Database Comparison</span>
        </div>
        <h1 style={{ margin: "12px 0 0", fontSize: 30, fontWeight: 700, lineHeight: 1.2, background: "linear-gradient(135deg, #2dd4bf, #a78bfa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Graph vs. Vector Databases</h1>
        <p style={{ margin: "12px 0 0", fontSize: 15, color: "#6a6a8a", lineHeight: 1.6, maxWidth: 600 }}>Practical, industry-grounded examples showing when to use each technology — and when you need both. Expand each example to explore the schema, sample data, queries, and rationale.</p>
        <p style={{ margin: "6px 0 0", fontSize: 12, color: "#4a4a6a" }}>CGS 2263 — Database Concepts &amp; Design — Miami Dade College — Spring 2026</p>
        <div style={{ display: "flex", gap: 20, marginTop: 28, padding: "6px 8px", background: "rgba(255,255,255,0.03)", borderRadius: 10, width: "fit-content" }}>
          {tabs.map((tab) => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ background: activeTab === tab.id ? `${tab.color}18` : "transparent", border: activeTab === tab.id ? `1px solid ${tab.color}30` : "1px solid transparent", color: activeTab === tab.id ? tab.color : "#6a6a8a", padding: "8px 22px", borderRadius: 7, fontSize: 14, fontWeight: 600, fontFamily: sans, letterSpacing: 0.2 }}>
              {tab.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 20 }}>
        {activeTab === "graph" && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18, padding: "10px 16px", background: "rgba(45,212,191,0.06)", borderRadius: 8, fontSize: 13.5, color: "#2dd4bf", lineHeight: 1.5 }}>
              <span style={{ fontSize: 18 }}>↔</span>
              <span><strong>Core question:</strong> "What is <em>connected</em> to this?" — traversing explicit relationships between entities</span>
            </div>
            {graphExamples.map((ex, i) => <ExampleCard key={i} example={ex} type="graph" />)}
          </>
        )}
        {activeTab === "vector" && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18, padding: "10px 16px", background: "rgba(167,139,250,0.06)", borderRadius: 8, fontSize: 13.5, color: "#a78bfa", lineHeight: 1.5 }}>
              <span style={{ fontSize: 18 }}>≈</span>
              <span><strong>Core question:</strong> "What is <em>similar</em> to this?" — finding semantic or visual proximity in embedding space</span>
            </div>
            {vectorExamples.map((ex, i) => <ExampleCard key={i} example={ex} type="vector" />)}
          </>
        )}
        {activeTab === "both" && (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18, padding: "10px 16px", background: "rgba(120,120,180,0.06)", borderRadius: 8, fontSize: 13.5, color: "#9090c0", lineHeight: 1.5 }}>
              <span style={{ fontSize: 18 }}>⚡</span>
              <span><strong>Combined power:</strong> Vector finds what's <em>relevant</em>, graph explains how things <em>relate</em> — together they give AI systems richer context</span>
            </div>
            {bothExamples.map((ex, i) => <CombinedCard key={i} example={ex} />)}
          </>
        )}
      </div>
      <div style={{ marginTop: 28, padding: "18px 22px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, fontSize: 13, lineHeight: 1.7, color: "#6a6a8a" }}>
        <strong style={{ color: "#b0b0c0" }}>Decision heuristic for students:</strong>{" "}
        If your query starts with "find things related to..." or "who is connected to..." → graph database.
        If your query starts with "find things similar to..." or "what matches this meaning..." → vector database.
        If you need both structured relationships AND semantic search → use them together (GraphRAG pattern).
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
